<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aarav Gupta — Portfolio</title>
  <meta name="description" content="Portfolio of Aarav Gupta — Developer, 3D Artist, and Game Developer." />
  <meta name="theme-color" content="#F9F9F6" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="hero fade-in">
      <div class="profile-container">
        <img src="images/profile.png" alt="Aarav Gupta" class="profile-pic" />
      </div>
      <h1 id="hero-name">Aarav Gupta</h1>
      <p id="hero-role" class="subtitle">Developer · 3D Artist · Game Dev</p>
      <p id="hero-location" class="location">India</p>
      <div id="contact-socials" class="social-links"></div>
    </header>

    <main>
      <section id="projects" class="section fade-in">
        <h2 class="section-title">Selected Projects</h2>
        <div id="projects-grid" class="grid"></div>
      </section>

      <section id="games" class="section fade-in">
        <h2 class="section-title">Games</h2>
        <div id="games-grid" class="grid"></div>
      </section>

      <section id="gallery" class="section fade-in">
        <h2 class="section-title">3D Art & Gallery</h2>
        <div id="gallery-grid" class="grid gallery-grid"></div>
      </section>
    </main>

    <footer class="footer fade-in">
      <p>© <span id="current-year"></span> <span id="footer-name">Aarav Gupta</span></p>
    </footer>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close-btn" aria-label="Close modal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-content">
        <div class="modal-gallery" id="modal-main-img"></div>
        <div class="modal-gallery-thumbs" id="modal-thumbs"></div>
        <div class="modal-body">
          <h3 id="modal-title">Title</h3>
          <div id="modal-tags" class="modal-tags"></div>
          <p id="modal-year" class="modal-year"></p>
          <p id="modal-desc" class="modal-desc"></p>
          <div id="modal-actions" class="modal-actions"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
